name: Deploy to GitHub Pages

on:
  # Deploy on every push to the default branch.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:
  # Rebuild daily at 06:00 UTC to pick up PORTFOLIO.md edits and new topics.
  schedule:
    - cron: '0 6 * * *'
  # Triggered by the demo pipeline (repository-definitions reusable workflow)
  # after it publishes a new demo or preview clip.
  repository_dispatch:
    types: [portfolio-content-updated]

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fetch published demos
        # Shallow-clone the public portfolio-demos storage repo into public/demos/
        # so the built demo bundles + manifests are served same-origin at
        # skylergodfrey.com/demos/<slug>/. Astro copies public/ into dist/ verbatim.
        # --depth 1 keeps the storage repo's (binary-heavy) history off this runner,
        # and public/demos/ is gitignored so nothing lands in the site repo's history.
        run: |
          set -euo pipefail
          rm -rf /tmp/portfolio-demos
          git clone --depth 1 https://github.com/SkylerGodfrey/portfolio-demos.git /tmp/portfolio-demos
          mkdir -p public/demos
          rsync -a --delete \
            --exclude='.git/' --exclude='README.md' --exclude='.github/' \
            /tmp/portfolio-demos/ public/demos/
      - name: Build with Astro
        uses: withastro/action@v3
        # Defaults: path=".", node-version=20, package-manager auto-detected.
        env:
          # Passed through to the Astro build process so getPortfolioProjects()
          # can make authenticated GitHub API calls and avoid rate limits.
          # PORTFOLIO_READ_TOKEN is a dedicated fine-grained read-only PAT that
          # can also see private showcase repos; when it isn't configured we
          # fall back to the Actions token (public repos + rate-limit relief).
          GITHUB_TOKEN: ${{ secrets.PORTFOLIO_READ_TOKEN || secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
